<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çikolata Tarifi</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">


    <style>

        body{
            margin: 0;
            background:#FFF8E7;
            font-family:Quicksand;
        }

        .page{
            max-width: 700px;
            margin: 60px auto;
            padding: 20px;
        }

        /* Paper */
        .paper{
            background: white;
            padding: 50px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            border-radius: 8px;
            transform: rotate(-1deg);
            position: relative;

            /* lines */
            background-image:linear-gradient(#eee 1px, transparent 1px);
            background-size: 100% 35px;
        }

        /* tape efect */
        .paper::before{
            content: "";
            position: absolute;
            width: 120px;
            height: 30px;
            background:rgba(255,255,255,0.6);
            top:-15px;
            left: 40%;
            transform: rotate(-5deg);
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        h1{
            font-family: Caveat;
            font-size: 60px;
            margin-top: 0;
        }

        /* post it */
        .note{
            background:#FFE9A8;
            padding: 25px;
            margin: 30px 0;
            transform: rotate(1deg);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .steps{
            font-family: Caveat;
            font-size: 28px;
        }


    </style>

</head>
<body>

    <div class="page">
        <div class="paper">

            <h1>📌 Çikolata Küpleri</h1>
            <p>Annemin tarif defterinden ❤️</p>

            <div class="note">
                <h3>Malzemeler</h3>
                <ul>
                    <li>200g bitter çikolata</li>
                    <li>100ml krema</li>
                    <li>1 yemek kaşığı tereyağı</li>
                    <li>Kakao</li>
                </ul>
            </div>

            <div class="steps">
                <h3>Yapılışı</h3>
                <p>1. Çikolatayı eritin</p>
                <p>2. Krema ekleyin</p>
                <p>3. Kalıba dökün</p>
                <p>4. Dolapta soğutup küp kesin</p>
            </div>
        </div>
    </div>

    
</body>
</html>
