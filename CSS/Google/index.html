<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root{
            --bg:#202124;
            --rg:white;
            --hr:#303134;
            --row:#9aa0a6;
            --black:#171717;
        }

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Roboto, sans-serif;
        }

        body{
            background: var(--bg);
            color: var(--rg);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Nav */
        .nav{
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 15px 20px;
            gap:20px;
            font-size: 14px;
        }

        .nav a{
            color: var(--rg);
            text-decoration: none;
            opacity: .85;
        }

        .menu{
            width: 18px;
            height: 18px;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 2px;
        }

        .menu div{
            width: 4px;
            height: 4px;
            background: var(--rg);
            border-radius: 50%;
        }

        /* Center */
        .center{
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Google Logo */
        .logo{
            font-size:150px;
            font-weight:500;
            letter-spacing:-3px;
            margin-bottom:25px;
        }

        .logo span:nth-child(1){color:#4285F4;}
        .logo span:nth-child(2){color:#EA4335;}
        .logo span:nth-child(3){color:#FBBC05;}
        .logo span:nth-child(4){color:#4285F4;}
        .logo span:nth-child(5){color:#34A853;}
        .logo span:nth-child(6){color:#EA4335;}

        /* Search */
        .search-box{
            width:580px;
            max-width:90%;
            background:#303134;
            border-radius: 30px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-box input{
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--rg);
            font-size: 16px;
        }

        .icons{
            display: flex;
            gap: 15px;
            opacity: .8;
        }

        /* Buttons */
        .buttons{
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }

        .buttons button{
            background: var(--hr);
            border: none;
            padding: 10px 18px;
            border-radius: 4px;
            color: var(--rg);
            cursor: pointer;
            border:1px solid transparent;
        }

        .buttons button:hover{
            border:1px solid #5f6368;
        }

        /* Footer */
        .footer{
            background: var(--black);
            padding: 15px 30px;
            font-size: 14px;
        }

        .footer-top{
            margin-bottom: 10px;
        }

        .footer-links{
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .footer a{
            color: var(--row);
            text-decoration: none;
            margin-right: 15px;
        }

    </style>
</head>
<body>

    <!-- NAV -->
     <div class="nav">
        <a href="#">Gmail</a>
        <a href="#">Görseller</a>

        <div class="menu">
            <div></div><div></div><div></div>
            <div></div><div></div><div></div>
            <div></div><div></div><div></div>
        </div>
     </div>

     <!-- Center -->
      <div class="center">

        <div class="logo">
            <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
        </div>

        <div class="search-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="m19.6 21l-6.3-6.3q-.75.6-1.725.95T9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l6.3 6.3zM9.5 14q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"/></svg>
            <input placeholder="Google'da ara">

            <div class="icons">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M4 19q-.825 0-1.412-.587T2 17V7q0-.825.588-1.412T4 5h16q.825 0 1.413.588T22 7v10q0 .825-.587 1.413T20 19zm4-3h8v-2H8zm-3-3h2v-2H5zm3 0h2v-2H8zm3 0h2v-2h-2zm3 0h2v-2h-2zm3 0h2v-2h-2zM5 10h2V8H5zm3 0h2V8H8zm3 0h2V8h-2zm3 0h2V8h-2zm3 0h2V8h-2z"/></svg>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-3 3a3 3 0 0 1-3-3V5a3 3 0 0 1 3-3m7 9c0 3.53-2.61 6.44-6 6.93V21h-2v-3.07c-3.39-.49-6-3.4-6-6.93h2a5 5 0 0 0 5 5a5 5 0 0 0 5-5z"/></svg>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="13" r="3"/><path stroke-linecap="round" d="M2 13.364c0-3.065 0-4.597.749-5.697a4.4 4.4 0 0 1 1.226-1.204c.72-.473 1.622-.642 3.003-.702c.659 0 1.226-.49 1.355-1.125A2.064 2.064 0 0 1 10.366 3h3.268c.988 0 1.839.685 2.033 1.636c.129.635.696 1.125 1.355 1.125c1.38.06 2.282.23 3.003.702c.485.318.902.727 1.226 1.204c.749 1.1.749 2.632.749 5.697s0 4.596-.749 5.697a4.4 4.4 0 0 1-1.226 1.204C18.904 21 17.343 21 14.222 21H9.778c-3.121 0-4.682 0-5.803-.735A4.4 4.4 0 0 1 2.75 19.06A3.4 3.4 0 0 1 2.277 18M19 10h-1"/></g></svg>
            </div>
        </div>

        <div class="buttons">
            <button>Google'da Ara</button>
            <button>Kendimi Şanslı Hissediyorum</button>
        </div>
      </div>

      <!-- Footer -->
       <div class="footer">
        <div class="footer-top">Türkiye</div>

        <div class="footer-links">
        
        <div>
            <a href="#">Hakkında</a>
            <a href="#">Reklam</a>
            <a href="#">İşletme</a>
            <a href="#">Arama nasıl çalışır?</a>
        </div>
        
        <div>
            <a href="#">Gizlilik</a>
            <a href="#">Şartlar</a>
            <a href="#">Ayarlar</a>
        </div>
       </div>
    </div>
    
</body>
</html>
