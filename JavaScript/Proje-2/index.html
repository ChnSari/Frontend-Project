<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro</title>
    
    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <!-- Css -->
     <link rel="stylesheet" href="assets/css/style.css">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

    <section class="app">
        <aside class="sidebar">
            <div class="brand">Task<span>Flow</span></div>
            <div class="nav">
                <button class="active" data-filter="all">Tümü 
                    <span class="badge" id="countAll">0</span>
                </button>

                <button data-filter="active">Aktif 
                    <span class="badge" id="countActive">0</span>
                </button>

                <button data-filter="done">Tamamlanan 
                    <span class="badge" id="countDone">0</span>
                </button>

            </div>
        </aside>
        <main class=" main">
            <div class="top">
                <h1>Görevler</h1>
                <input id="search" placeholder="Ara">
            </div>

            <div class="add-task">
                <input id="taskInput" placeholder="Yeni Görev">
                <button id="addBtn">Ekle</button>
            </div>
            <section class="tasks" id="taskList"></section>
        </main>
    </section>

    <!-- Toast -->
    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="successToast" class="toast text-bg-success">
            <div class="toast-body">
                Görev eklendi
            </div>
        </div>
        <div id="errorToast" class="toast text-bg-danger">
            <div class="toast-body">
                Boş görev eklenemez
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
     <script src="assets/js/script.js"></script>
</body>
</html>
